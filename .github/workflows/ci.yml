name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Type · Lint · Build
    runs-on: ubuntu-latest
    # Opt the bundled JS actions onto the Node 24 runner ahead of the June 2026
    # deprecation of Node 20 (per GitHub's deprecation notice).
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"

      - name: TypeScript check
        run: npx tsc --noEmit

      # NOTE: tighten to `--max-warnings 0` after the warning-cleanup pass.
      - name: ESLint
        run: npx eslint .

      - name: Build
        run: npm run build
        env:
          DATABASE_URL:                      ${{ secrets.DATABASE_URL }}
          AUTH_SECRET:                       ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_SENTRY_DSN:            ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG:                        ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT:                    ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN:                 ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_LIVEBLOCKS_PUBLIC_KEY: "pk_dummy"
          UPLOADTHING_TOKEN:                 "ut_dummy"
          ANTHROPIC_API_KEY:                 "sk-ant-dummy"
          UPSTASH_REDIS_REST_URL:            "https://dummy.upstash.io"
          UPSTASH_REDIS_REST_TOKEN:          "dummy"
