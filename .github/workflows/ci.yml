name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  # ── Gate 1: static checks + unit tests + build (no DB needed) ────────────────
  quality:
    name: Type · Lint · Unit · Build
    runs-on: ubuntu-latest
    env:
      # Opt bundled JS actions onto Node 24 ahead of the Node 20 deprecation.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: "postgresql://dummy:dummy@localhost/dummy"

      - name: TypeScript check
        run: npm run typecheck

      # NOTE: `eslint .` fails on ERRORS (the real gate). `--max-warnings 0` is
      # deferred until the ~134 pre-existing legacy react-hooks warnings are cleaned.
      - name: ESLint
        run: npx eslint .

      - name: Unit tests (+ coverage)
        run: npm run test:coverage -- tests/unit

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          NEXT_PUBLIC_LIVEBLOCKS_PUBLIC_KEY: "pk_dummy"
          UPLOADTHING_TOKEN: "ut_dummy"
          ANTHROPIC_API_KEY: "sk-ant-dummy"
          UPSTASH_REDIS_REST_URL: "https://dummy.upstash.io"
          UPSTASH_REDIS_REST_TOKEN: "dummy"

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  # ── Gate 2: integration + e2e against a REAL Postgres + built app ────────────
  db-tests:
    name: Integration · E2E
    runs-on: ubuntu-latest
    needs: quality
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DATABASE_URL: "postgresql://test:test@localhost:5432/trello_test"
      AUTH_SECRET: "ci-test-secret-not-for-prod"
      NEXTAUTH_URL: "http://localhost:3000"
      NODE_ENV: "test"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: trello_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Push schema to test DB
        run: npx prisma db push --skip-generate --accept-data-loss
        # prisma generate runs via postinstall; db push creates the schema.

      - name: Integration tests
        run: npx vitest run tests/integration
        env:
          INTEGRATION: "1"

      - name: Build app
        run: npm run build
        env:
          NEXT_PUBLIC_LIVEBLOCKS_PUBLIC_KEY: "pk_dummy"
          UPLOADTHING_TOKEN: "ut_dummy"
          ANTHROPIC_API_KEY: "sk-ant-dummy"

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npx playwright test
        env:
          NEXT_PUBLIC_LIVEBLOCKS_PUBLIC_KEY: "pk_dummy"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report
          if-no-files-found: ignore
