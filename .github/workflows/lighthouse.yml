name: Lighthouse

# Deploy-measured Lighthouse against a Vercel preview, enforcing the budgets in
# lighthouserc.json (Performance/A11y/Best-Practices/SEO >= 0.95, LCP < 2s,
# CLS < 0.1). MANUAL-ONLY (workflow_dispatch): it needs a publicly reachable URL,
# so it is NOT wired to deployment_status — otherwise it would fail on every
# protected/auth-walled preview (Vercel SSO redirect) and red the deploy. Run it
# by hand against a public URL (e.g. /welcome) once protection is off.
on:
  workflow_dispatch:
    inputs:
      url:
        description: "Public URL to audit (e.g. https://<preview>/welcome)"
        required: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.14.x
      - name: Run Lighthouse CI
        run: lhci autorun --collect.url="${{ github.event.inputs.url }}" --collect.numberOfRuns=3
